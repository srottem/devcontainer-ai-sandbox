name: Publish AI Sandbox Image

on:
  push:
    branches: [ main ]
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/ai-sandbox:latest \
            -t ghcr.io/${{ github.repository_owner }}/ai-sandbox:${{ github.ref_name }} \
            -f Dockerfile .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/ai-sandbox:latest
          docker push ghcr.io/${{ github.repository_owner }}/ai-sandbox:${{ github.ref_name }}
